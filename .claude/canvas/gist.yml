  - name: Control Flow
    description: "Add if, and, or, begin"
    features: ["if", "and", "or", "begin"]
    timeline: "0.5 day"
    success: "Can write conditional logic"

  - name: Polish
    description: "Error messages, tests, documentation"
    features: ["100% test coverage", "Good error messages", "README"]
    timeline: "0.5 day"
    success: "Ready for others to use/extend"

